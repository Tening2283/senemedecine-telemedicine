name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  NODE_VERSION: '18'
  POSTGRES_VERSION: '15'

jobs:
  # Job de validation du code
  validate:
    name: Code Validation
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
        
    - name: Lint backend
      run: npm run lint --workspace=backend
      
    - name: Lint frontend
      run: npm run lint --workspace=frontend
      
    - name: Check formatting
      run: |
        npm run format:check --workspace=backend
        npm run format:check --workspace=frontend

  # Job de sécurité
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
        
    - name: Run security audit backend
      run: npm audit --workspace=backend --audit-level high
      
    - name: Run security audit frontend
      run: npm audit --workspace=frontend --audit-level high

# Commented out sections for future implementation:
